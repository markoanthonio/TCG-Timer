<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TCG - MARKO | Mobile First</title>
    <style>
        /* ----- RESET Y BASE MOBILE FIRST ----- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --player1-color: #860202;
            --player2-color: #690164;
            --accent-color: #fbff00;
            --green-state: #1302ff;
            --red-state: #f44336;
            --touch-target: 44px;      /* mínimo recomendado para dedos */
            --border-radius-btn: 999px;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            font-family: system-ui, 'Segoe UI', 'Digital', monospace;
        }

        /* ---- SECCIONES DE JUGADORES (mitad cada uno) ---- */
        .player-section {
            flex: 1 1 0;
            min-height: 0;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.2s ease;
            overflow-y: auto;   /* permitir scroll si el contenido crece */
            overflow-x: hidden;
        }

        .player1 {
            background: var(--player1-color);
            transform: rotate(180deg);
        }

        .player2 {
            background: var(--player2-color);
        }

        /* Resaltado de turno (más visible en móvil) */
        .player-section.active-turn {
            box-shadow: inset 0 0 0 4px var(--accent-color);
            animation: pulse-turn 2s infinite;
        }

        @keyframes pulse-turn {
            0% { box-shadow: inset 0 0 0 4px var(--accent-color); }
            50% { box-shadow: inset 0 0 0 8px var(--accent-color); }
            100% { box-shadow: inset 0 0 0 4px var(--accent-color); }
        }

        /* Contenido interno de cada jugador (centrado y con padding) */
        .player-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px 8px;
            gap: 12px;
        }

        /* Contenedor de displays (vida + tiempo) */
        .display-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 8px;
        }

        /* Estilos generales de números */
        .life-display, .time-display {
            font-family: 'Courier New', 'Digital', monospace;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 12px rgba(0,0,0,0.6);
            text-align: center;
            user-select: none;
            line-height: 1.2;
            transition: all 0.1s ease;
        }

        /* Tamaños responsive para vida y tiempo */
        .life-display {
            font-size: clamp(2.5rem, 15vw, 6rem);
        }

        .time-display {
            font-size: clamp(1.8rem, 10vw, 4rem);
        }

        /* Cuando ambos están visibles (modo both) */
        .life-display.with-timer {
            font-size: clamp(2rem, 12vw, 4.5rem);
        }
        .time-display.with-life {
            font-size: clamp(1.4rem, 8vw, 2.5rem);
        }

        /* Controles de vida (+ / -) */
        .life-controls {
            display: flex;
            gap: 24px;
            margin-top: 6px;
        }

        .life-btn {
            width: clamp(50px, 15vw, 70px);
            height: clamp(50px, 15vw, 70px);
            border-radius: 50%;
            border: 3px solid white;
            background: rgba(255,255,255,0.95);
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }

        .life-btn:active {
            transform: scale(0.94);
        }

        .life-btn.decrease {
            background: var(--red-state);
            color: white;
        }

        .life-btn.increase {
            background: var(--green-state);
            color: white;
        }

        /* ----- MARCADORES DE HABILIDADES (GRID RESPONSIVE) ----- */
        .ability-markers {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: minmax(44px, auto);
            gap: 10px 12px;
            width: 90%;
            max-width: 500px;
            margin: 8px auto;
            padding: 8px;
            background: rgba(0,0,0,0.25);
            border-radius: 32px;
            backdrop-filter: blur(2px);
        }

        /* Posiciones específicas para mantener la distribución original */
        .player1 .ability-markers {
            transform: rotate(180deg);  /* se rotan los botones para que estén al derecho visualmente */
        }
        /* Pero el texto dentro de los botones no debe rotarse */
        .player1 .ability-markers .ability-button {
            transform: rotate(180deg);
        }

        .ability-button {
            background: linear-gradient(135deg, var(--green-state) 60%, #2e8bff 100%);
            border: 2px solid var(--accent-color);
            border-radius: 28px;
            color: white;
            font-weight: bold;
            font-size: clamp(0.7rem, 4vw, 1rem);
            padding: 8px 4px;
            text-align: center;
            white-space: nowrap;
            overflow-x: auto;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            touch-action: manipulation;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Permitir que en móviles muy pequeños el texto se ajuste */
        @media (max-width: 480px) {
            .ability-button {
                white-space: normal;
                word-break: break-word;
                font-size: 0.75rem;
                padding: 6px 2px;
            }
            .ability-markers {
                gap: 8px;
                width: 95%;
            }
        }

        .ability-button.used {
            background: var(--red-state);
            filter: grayscale(0.2);
            text-decoration: line-through;
            opacity: 0.8;
        }

        .ability-button:active {
            transform: scale(0.96);
        }

        /* Asignación de celdas en el grid (mantiene la posición de los botones) */
        /* El marcador principal siempre será el primer botón (main-marker) y se ubica en el centro abajo */
        .ability-markers .ability-button.main-marker {
            grid-column: 2 / 3;
            grid-row: 3 / 4;
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            border-width: 3px;
            font-size: clamp(0.8rem, 5vw, 1.1rem);
        }

        /* Los demás botones se colocan automáticamente, pero podemos asignar posiciones fijas para simular el diseño original */
        .ability-markers .ability-button:nth-child(2) { grid-column: 1 / 2; grid-row: 1 / 2; }
        .ability-markers .ability-button:nth-child(3) { grid-column: 3 / 4; grid-row: 1 / 2; }
        .ability-markers .ability-button:nth-child(4) { grid-column: 1 / 2; grid-row: 2 / 3; }
        .ability-markers .ability-button:nth-child(5) { grid-column: 3 / 4; grid-row: 2 / 3; }
        .ability-markers .ability-button:nth-child(6) { grid-column: 1 / 2; grid-row: 3 / 4; }
        .ability-markers .ability-button:nth-child(7) { grid-column: 3 / 4; grid-row: 3 / 4; }
        .ability-markers .ability-button:nth-child(8) { grid-column: 2 / 3; grid-row: 2 / 3; }  /* centro adicional si existe */

        /* ----- CONTROLES FLOTANTES (más grandes y accesibles) ----- */
        .control-btn {
            position: fixed;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #fffbe7, #e6e6e6);
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            z-index: 15;
            cursor: pointer;
            transition: 0.1s linear;
            touch-action: manipulation;
        }

        .control-btn:active {
            transform: scale(0.92);
        }

        /* Ubicación específica de cada botón */
        .start-btn {
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
        }
        .pause-btn {
            bottom: 20px;
            right: 20px;
            background: #ff9800;
            color: white;
        }
        .final-stop-btn {
            bottom: 20px;
            right: 20px;
            background: #f44336;
            color: white;
        }
        .config-btn {
            top: 20px;
            left: 20px;
            background: #333;
            color: white;
            font-size: 1.5rem;
        }

        /* Botón de cambio de turno CENTRAL y GRANDE */
        .turn-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            max-width: 320px;
            height: 64px;
            background: var(--accent-color);
            color: black;
            font-weight: bold;
            font-size: 1.5rem;
            border: none;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.1s linear;
            touch-action: manipulation;
        }

        .turn-btn:active {
            transform: translate(-50%, -50%) scale(0.97);
        }

        .turn-arrow {
            font-size: 1.6rem;
            font-weight: bold;
        }

        /* ----- PANEL DE CONFIGURACIÓN (mobile friendly) ----- */
        .config-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,10,0.98);
            backdrop-filter: blur(8px);
            padding: 20px 16px;
            border-radius: 28px;
            width: 92vw;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 30;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .config-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .config-tab {
            flex: 1;
            padding: 12px 0;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .config-tab.active {
            background: var(--accent-color);
            color: black;
        }

        .config-content {
            display: none;
        }
        .config-content.active {
            display: block;
        }

        .config-input, .marker-input {
            width: 100%;
            padding: 14px 12px;
            margin: 10px 0;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
            text-align: center;
            background: #222;
            color: white;
        }

        .display-options, .markers-config {
            background: rgba(255,255,255,0.08);
            padding: 16px;
            border-radius: 24px;
            margin: 16px 0;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option-item input {
            width: 20px;
            height: 20px;
        }

        .marker-list {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 12px;
        }
        .marker-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 40px;
            margin-bottom: 8px;
        }
        .remove-marker-btn {
            background: var(--red-state);
            border: none;
            color: white;
            border-radius: 40px;
            padding: 4px 12px;
            cursor: pointer;
        }

        .config-btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .config-btn-group button {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .apply-btn { background: var(--green-state); color: white; }
        .cancel-btn { background: var(--red-state); color: white; }
        .reset-btn { background: #666; color: white; }

        /* Ajustes para landscape (horizontal) */
        @media (orientation: landscape) and (max-height: 500px) {
            .player-content {
                flex-direction: row;
                justify-content: space-evenly;
                padding: 6px;
            }
            .display-container {
                width: auto;
                min-width: 140px;
            }
            .ability-markers {
                width: 60%;
                gap: 6px;
            }
            .life-display, .time-display {
                font-size: clamp(1.2rem, 8vh, 3rem);
            }
            .life-btn {
                width: 44px;
                height: 44px;
                font-size: 1.5rem;
            }
            .turn-btn {
                height: 48px;
                font-size: 1.2rem;
                width: auto;
                padding: 0 20px;
            }
        }

        /* Prevenir scroll no deseado */
        body {
            overscroll-behavior: none;
        }
        button {
            user-select: none;
        }
    </style>
</head>
<body>
    <!-- Jugador 1 (Rojo, arriba) -->
    <div class="player-section player1">
        <div class="player-content">
            <div class="display-container">
                <div id="life1-display" class="life-display">20</div>
                <div id="life1-controls" class="life-controls">
                    <button class="life-btn decrease" onclick="changeLife(1, -1)">-</button>
                    <button class="life-btn increase" onclick="changeLife(1, 1)">+</button>
                </div>
                <div id="time1-display" class="time-display">25:00</div>
            </div>
            <div class="ability-markers" id="markers1"></div>
        </div>
    </div>
    
    <!-- Jugador 2 (Morado, abajo) -->
    <div class="player-section player2">
        <div class="player-content">
            <div class="display-container">
                <div id="life2-display" class="life-display">20</div>
                <div id="life2-controls" class="life-controls">
                    <button class="life-btn decrease" onclick="changeLife(2, -1)">-</button>
                    <button class="life-btn increase" onclick="changeLife(2, 1)">+</button>
                </div>
                <div id="time2-display" class="time-display">25:00</div>
            </div>
            <div class="ability-markers" id="markers2"></div>
        </div>
    </div>
    
    <!-- Controles flotantes -->
    <button id="startBtn" class="control-btn start-btn" onclick="startTimer()">▶</button>
    <button id="pauseBtn" class="control-btn pause-btn" onclick="pauseTimer()" style="display: none;">⏸</button>
    <button id="finalStopBtn" class="control-btn final-stop-btn" onclick="resetTimer()" style="display: none;">⏹</button>
    <button class="control-btn config-btn" onclick="showConfig()">⚙</button>
    
    <!-- Botón de cambio de turno central -->
    <button id="turnBtn" class="turn-btn" onclick="switchTurn()">
        <span class="turn-arrow">▲</span>
        <span>ROJO</span>
        <span class="turn-arrow">▲</span>
    </button>
    
    <!-- Panel de configuración -->
    <div id="configPanel" class="config-panel" style="display: none;">
        <div class="config-tabs">
            <button class="config-tab active" onclick="showTab(event, 'timer')">Tiempo</button>
            <button class="config-tab" onclick="showTab(event, 'display')">Pantalla</button>
            <button class="config-tab" onclick="showTab(event, 'markers')">Botones</button>
        </div>
        
        <div id="timer-config" class="config-content active">
            <h3>Minutos por jugador</h3>
            <input type="number" id="timerMinutes" class="config-input" value="25" min="1" max="120">
            <div class="config-btn-group">
                <button class="apply-btn" onclick="applyTimerSettings()">Aplicar</button>
                <button class="reset-btn" onclick="resetTimer()">Resetear</button>
            </div>
        </div>
        
        <div id="display-config" class="config-content">
            <h3>Modo de visualización</h3>
            <div class="display-options">
                <div class="option-group">
                    <div class="option-item">
                        <input type="radio" id="mode-timer" name="display-mode" value="timer">
                        <label for="mode-timer">Solo Cronómetro</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" id="mode-life" name="display-mode" value="life">
                        <label for="mode-life">Solo Vida</label>
                    </div>
                    <div class="option-item">
                        <input type="radio" id="mode-both" name="display-mode" value="both" checked>
                        <label for="mode-both">Cronómetro + Vida</label>
                    </div>
                </div>
                <h4>Vida inicial</h4>
                <input type="number" id="initial-life" class="config-input" value="20" min="1" max="999">
            </div>
            <div class="config-btn-group">
                <button class="apply-btn" onclick="applyDisplaySettings()">Aplicar</button>
                <button class="cancel-btn" onclick="hideConfig()">Volver</button>
            </div>
        </div>
        
        <div id="markers-config" class="config-content">
            <h3>Marcadores de habilidades</h3>
            <div class="markers-config">
                <h4>Jugador Rojo</h4>
                <input type="text" id="main-ability1" class="config-input" placeholder="Marcador principal" value="TRAINER">
                <div class="marker-counter" id="ability-counter1">Adicionales: 0/6</div>
                <div class="marker-input-group">
                    <input type="text" id="new-ability1" class="marker-input" placeholder="Nuevo marcador">
                    <button id="add-btn1" class="add-marker-btn" onclick="addAdditionalMarker(1)">+ Agregar</button>
                </div>
                <div id="additional-markers1" class="marker-list"></div>
            </div>
            <div class="markers-config">
                <h4>Jugador Morado</h4>
                <input type="text" id="main-ability2" class="config-input" placeholder="Marcador principal" value="TRAINER">
                <div class="marker-counter" id="ability-counter2">Adicionales: 0/6</div>
                <div class="marker-input-group">
                    <input type="text" id="new-ability2" class="marker-input" placeholder="Nuevo marcador">
                    <button id="add-btn2" class="add-marker-btn" onclick="addAdditionalMarker(2)">+ Agregar</button>
                </div>
                <div id="additional-markers2" class="marker-list"></div>
            </div>
            <div class="config-btn-group">
                <button class="apply-btn" onclick="updateAbilities()">Aplicar</button>
                <button class="reset-btn" onclick="resetAbilities()">Reset</button>
                <button class="cancel-btn" onclick="hideConfig()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        let timer1 = 25 * 60, timer2 = 25 * 60;
        let life1 = 20, life2 = 20;
        let isRunning = false;
        let timerInterval = null;
        let currentPlayer = 1;
        let displayMode = 'both';
        
        let player1Abilities = ['GX/EX/V'];
        let player2Abilities = ['GX/EX/V'];
        let additionalAbilities1 = [];
        let additionalAbilities2 = [];
        
        window.onload = () => {
            loadConfig();
            updateDisplays();
            applyDisplaySettings();
            createAbilityMarkers();
            updateAdditionalMarkersConfig(1);
            updateAdditionalMarkersConfig(2);
            document.querySelector('.player1').classList.add('active-turn');
            updateTurnButtonText();
        };
        
        function updateTurnButtonText() {
            const btn = document.getElementById('turnBtn');
            if (currentPlayer === 1) {
                btn.innerHTML = '<span class="turn-arrow">▲</span><span>ROJO</span><span class="turn-arrow">▲</span>';
                btn.className = 'turn-btn';
            } else {
                btn.innerHTML = '<span class="turn-arrow">▼</span><span>MORADO</span><span class="turn-arrow">▼</span>';
                btn.className = 'turn-btn';
            }
        }
        
        function showConfig() {
            document.getElementById('configPanel').style.display = 'block';
            loadMarkersConfig();
        }
        function hideConfig() { document.getElementById('configPanel').style.display = 'none'; }
        function showTab(event, tabName) {
            document.querySelectorAll('.config-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.config-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`${tabName}-config`).classList.add('active');
            event.target.classList.add('active');
        }
        
        function toggleAbility(button) { button.classList.toggle('used'); }
        
        function createAbilityMarkers() {
            const container1 = document.getElementById('markers1');
            const container2 = document.getElementById('markers2');
            container1.innerHTML = '';
            container2.innerHTML = '';
            
            const addMarkers = (container, abilitiesArray, additionalArray) => {
                const allAbilities = [abilitiesArray[0], ...additionalArray];
                allAbilities.forEach((text, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'ability-button';
                    if (idx === 0) btn.classList.add('main-marker');
                    btn.textContent = text;
                    btn.onclick = () => toggleAbility(btn);
                    container.appendChild(btn);
                });
            };
            
            addMarkers(container1, player1Abilities, additionalAbilities1);
            addMarkers(container2, player2Abilities, additionalAbilities2);
        }
        
        function addAdditionalMarker(player) {
            const input = document.getElementById(`new-ability${player}`);
            const text = input.value.trim();
            if (!text) return;
            if (player === 1 && additionalAbilities1.length < 6) {
                additionalAbilities1.push(text);
                input.value = '';
                updateAdditionalMarkersConfig(1);
                createAbilityMarkers();
            } else if (player === 2 && additionalAbilities2.length < 6) {
                additionalAbilities2.push(text);
                input.value = '';
                updateAdditionalMarkersConfig(2);
                createAbilityMarkers();
            }
        }
        
        function removeAdditionalMarker(player, index) {
            if (player === 1) additionalAbilities1.splice(index, 1);
            else additionalAbilities2.splice(index, 1);
            updateAdditionalMarkersConfig(player);
            createAbilityMarkers();
        }
        
        function updateAdditionalMarkersConfig(player) {
            const abilities = player === 1 ? additionalAbilities1 : additionalAbilities2;
            const container = document.getElementById(`additional-markers${player}`);
            container.innerHTML = '';
            abilities.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'marker-item';
                div.innerHTML = `<span>${item}</span><button class="remove-marker-btn" onclick="removeAdditionalMarker(${player}, ${i})">✖</button>`;
                container.appendChild(div);
            });
            document.getElementById(`ability-counter${player}`).innerText = `Adicionales: ${abilities.length}/6`;
            document.getElementById(`add-btn${player}`).disabled = abilities.length >= 6;
        }
        
        function loadMarkersConfig() {
            document.getElementById('main-ability1').value = player1Abilities[0];
            document.getElementById('main-ability2').value = player2Abilities[0];
            updateAdditionalMarkersConfig(1);
            updateAdditionalMarkersConfig(2);
        }
        
        function updateAbilities() {
            player1Abilities[0] = document.getElementById('main-ability1').value.trim() || 'GX/EX/V';
            player2Abilities[0] = document.getElementById('main-ability2').value.trim() || 'GX/EX/V';
            createAbilityMarkers();
            saveConfig();
            hideConfig();
        }
        
        function resetAbilities() {
            player1Abilities = ['GX/EX/V'];
            player2Abilities = ['GX/EX/V'];
            additionalAbilities1 = [];
            additionalAbilities2 = [];
            createAbilityMarkers();
            loadMarkersConfig();
            saveConfig();
        }
        
        function applyTimerSettings() {
            const mins = parseInt(document.getElementById('timerMinutes').value) || 25;
            timer1 = timer2 = mins * 60;
            updateDisplays();
            saveConfig();
            hideConfig();
        }
        
        function resetTimer() {
            isRunning = false;
            if (timerInterval) clearInterval(timerInterval);
            const mins = parseInt(document.getElementById('timerMinutes').value) || 25;
            timer1 = timer2 = mins * 60;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('finalStopBtn').style.display = 'none';
            updateDisplays();
            saveConfig();
        }
        
        function formatTime(sec) { return `${Math.floor(sec/60)}`.padStart(2,'0')+':'+`${sec%60}`.padStart(2,'0'); }
        function updateDisplays() {
            document.getElementById('time1-display').innerText = formatTime(timer1);
            document.getElementById('time2-display').innerText = formatTime(timer2);
            document.getElementById('life1-display').innerText = life1;
            document.getElementById('life2-display').innerText = life2;
        }
        
        function applyDisplaySettings() {
            const mode = document.querySelector('input[name="display-mode"]:checked').value;
            const initLife = parseInt(document.getElementById('initial-life').value) || 20;
            displayMode = mode;
            life1 = life2 = initLife;
            const lifeDisplays = [document.getElementById('life1-display'), document.getElementById('life2-display')];
            const timeDisplays = [document.getElementById('time1-display'), document.getElementById('time2-display')];
            const lifeControls = [document.getElementById('life1-controls'), document.getElementById('life2-controls')];
            
            if (mode === 'timer') {
                lifeDisplays.forEach(d => d.style.display = 'none');
                lifeControls.forEach(c => c.style.display = 'none');
                timeDisplays.forEach(t => t.style.display = 'block');
            } else if (mode === 'life') {
                lifeDisplays.forEach(d => d.style.display = 'block');
                lifeControls.forEach(c => c.style.display = 'flex');
                timeDisplays.forEach(t => t.style.display = 'none');
            } else {
                lifeDisplays.forEach(d => { d.style.display = 'block'; d.classList.add('with-timer'); });
                lifeControls.forEach(c => c.style.display = 'flex');
                timeDisplays.forEach(t => { t.style.display = 'block'; t.classList.add('with-life'); });
            }
            updateDisplays();
            saveConfig();
        }
        
        function changeLife(player, delta) {
            if (player === 1) life1 = Math.max(0, life1 + delta);
            else life2 = Math.max(0, life2 + delta);
            updateDisplays();
            saveConfig();
        }
        
        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('pauseBtn').style.display = 'block';
                document.getElementById('finalStopBtn').style.display = 'none';
                timerInterval = setInterval(() => {
                    if (currentPlayer === 1) {
                        if (timer1 > 0) timer1--;
                        if (timer1 === 0) { pauseTimer(); alert('¡Tiempo agotado para ROJO!'); }
                    } else {
                        if (timer2 > 0) timer2--;
                        if (timer2 === 0) { pauseTimer(); alert('¡Tiempo agotado para MORADO!'); }
                    }
                    updateDisplays();
                }, 1000);
            }
        }
        
        function pauseTimer() {
            if (isRunning) {
                isRunning = false;
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('pauseBtn').style.display = 'none';
                document.getElementById('finalStopBtn').style.display = 'block';
            }
        }
        
        function switchTurn() {
            if (isRunning) {
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                updateTurnButtonText();
                const p1 = document.querySelector('.player1');
                const p2 = document.querySelector('.player2');
                if (currentPlayer === 1) { p1.classList.add('active-turn'); p2.classList.remove('active-turn'); }
                else { p2.classList.add('active-turn'); p1.classList.remove('active-turn'); }
                resetPlayerMarkers(currentPlayer);
            }
        }
        
        function resetPlayerMarkers(player) {
            document.querySelectorAll(`#markers${player} .ability-button`).forEach(btn => btn.classList.remove('used'));
        }
        
        function saveConfig() {
            const data = { timer1, timer2, life1, life2, displayMode, player1Abilities, player2Abilities, additionalAbilities1, additionalAbilities2, timerMinutes: Math.floor(timer1/60) };
            localStorage.setItem('pokemonTCGTimer', JSON.stringify(data));
        }
        
        function loadConfig() {
            const saved = localStorage.getItem('pokemonTCGTimer');
            if (saved) {
                const c = JSON.parse(saved);
                timer1 = c.timer1; timer2 = c.timer2; life1 = c.life1; life2 = c.life2; displayMode = c.displayMode;
                player1Abilities = c.player1Abilities; player2Abilities = c.player2Abilities;
                additionalAbilities1 = c.additionalAbilities1 || []; additionalAbilities2 = c.additionalAbilities2 || [];
                document.getElementById('timerMinutes').value = c.timerMinutes || 25;
                document.getElementById('initial-life').value = life1;
                const modeRadio = document.querySelector(`input[name="display-mode"][value="${displayMode}"]`);
                if (modeRadio) modeRadio.checked = true;
            }
        }
        
        document.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); isRunning ? pauseTimer() : startTimer(); } });
    </script>
</body>
</html>
